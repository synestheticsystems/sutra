name: Release DMG

# Builds a signed + notarized + stapled macOS .dmg, attaches it to the GitHub
# release, and bumps the Homebrew cask in synestheticsystems/homebrew-tap.
#
# This is a SEPARATE workflow from publish.yml/release.yml on purpose: it runs
# only after the crates.io publish + tag push in publish.yml has fully
# completed, so a signing / notarization / cask-bump failure here can NEVER
# fail the crates.io publish.
#
# Triggers:
#   - workflow_run: after the "Publish" workflow completes successfully.
#       This is the AUTOMATIC path. We deliberately do NOT use
#       `on: release: published`, because the GitHub Release is created by
#       release.yml with the default GITHUB_TOKEN, and GitHub suppresses
#       workflow triggers for events generated by GITHUB_TOKEN (anti-recursion).
#       A `release: published` trigger would therefore never fire. `workflow_run`
#       is NOT subject to that suppression and fires after Publish succeeds.
#   - workflow_dispatch: manual re-run for a given tag (e.g. v0.1.4).
#
# Required repository secrets (one-time setup on synestheticsystems/sutra):
#   MACOS_CERT_P12          base64 of the Developer ID Application cert+key .p12
#   MACOS_CERT_PASSWORD     password used when exporting that .p12
#   MACOS_KEYCHAIN_PASSWORD any throwaway password for the temp CI keychain
#   NOTARY_KEY_P8           base64 of the App Store Connect API key .p8
#   NOTARY_KEY_ID           the App Store Connect API key ID
#   NOTARY_ISSUER           the App Store Connect issuer UUID
#   HOMEBREW_TAP_TOKEN      PAT with contents:write on synestheticsystems/homebrew-tap

on:
  workflow_run:
    workflows: ["Publish"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v0.1.4)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  # One DMG build per tag; never cancel an in-flight notarization.
  group: release-dmg-${{ github.event.inputs.tag || github.event.workflow_run.head_branch || github.run_id }}
  cancel-in-progress: false

jobs:
  dmg:
    # On the automatic (workflow_run) path, only proceed when Publish succeeded.
    # The manual (workflow_dispatch) path always proceeds.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: macos-latest
    env:
      SIGN_IDENTITY: "Developer ID Application: Synesthetic Systems LLC (N893VNX4ZP)"
    steps:
      - name: Check signing secrets are present
        id: guard
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          NOTARY_KEY_P8: ${{ secrets.NOTARY_KEY_P8 }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${MACOS_CERT_P12:-}" ] || [ -z "${NOTARY_KEY_P8:-}" ] || [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "::warning::macOS signing/tap secrets are not configured; skipping DMG build and cask bump."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve release tag
        id: tagsrc
        if: steps.guard.outputs.skip != 'true'
        env:
          # On workflow_dispatch the user supplies the tag. On workflow_run the
          # Publish workflow ran on the default branch and pushed vX.Y.Z; we read
          # the version from Cargo.toml at that commit (head_sha) and form vX.Y.Z.
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "tag=$DISPATCH_TAG" >> "$GITHUB_OUTPUT"
            echo "ref=$DISPATCH_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.skip != 'true'
        with:
          # workflow_dispatch -> the tag; workflow_run -> the published commit.
          ref: ${{ steps.tagsrc.outputs.ref }}
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        if: steps.guard.outputs.skip != 'true'
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Derive version
        id: ver
        if: steps.guard.outputs.skip != 'true'
        env:
          TAG_IN: ${{ steps.tagsrc.outputs.tag }}
        run: |
          set -euo pipefail
          if [ -n "$TAG_IN" ]; then
            TAG="$TAG_IN"
            VERSION="${TAG#v}"
          else
            # workflow_run path: derive the version from Cargo.toml at this commit.
            VERSION="$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')"
            TAG="v$VERSION"
          fi
          case "$VERSION" in
            ""|*[!0-9.]*)
              echo "::error::Refusing to build: derived version '$VERSION' (tag '$TAG') is not vX.Y.Z."
              exit 1
              ;;
          esac
          # On the automatic path, ensure the tag publish.yml pushed actually exists.
          if ! git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::warning::Tag $TAG not found locally; the release upload uses the tag name regardless."
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building DMG for tag=$TAG version=$VERSION"

      - name: Import Developer ID certificate into a temporary keychain
        if: steps.guard.outputs.skip != 'true'
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail   # NOTE: no set -x — secrets are in this step.

          KEYCHAIN="$RUNNER_TEMP/sutra-signing.keychain-db"
          CERT_P12="$RUNNER_TEMP/cert.p12"

          # Decode the cert. base64 -D is the macOS spelling.
          echo "$MACOS_CERT_P12" | base64 -D > "$CERT_P12"
          # base64 -D exits 0 on empty/garbled input, so assert non-empty here
          # rather than failing cryptically later in `security import`.
          if [ ! -s "$CERT_P12" ]; then
            echo "::error::MACOS_CERT_P12 decoded to an empty file — secret is missing or not valid base64."
            exit 1
          fi

          # Idempotent: a leftover keychain from a cancelled run would make
          # create-keychain fail with exit 48.
          security delete-keychain "$KEYCHAIN" 2>/dev/null || true

          # Create + unlock a dedicated keychain (avoids touching the login keychain).
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"   # auto-lock after 6h
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"

          # Import the cert+key; allow codesign/security tools to use it non-interactively.
          security import "$CERT_P12" \
            -k "$KEYCHAIN" \
            -P "$MACOS_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # CRITICAL: without this, codesign hangs forever on a GUI password prompt
          # that never appears on a headless runner.
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"

          # Put our keychain first in the search list so SIGN_IDENTITY resolves,
          # keeping the existing system/login keychains available too.
          # shellcheck disable=SC2046  # intentional split: pass each existing keychain as a separate arg
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/[\"[:space:]]//g')

          # Stop tracking the decoded .p12 on disk now that it's imported.
          rm -f "$CERT_P12"

          # Real guard: find-identity -v exits 0 even when it prints
          # "0 valid identities found", so grep for the actual identity string.
          if ! security find-identity -v -p codesigning "$KEYCHAIN" | grep -qF "$SIGN_IDENTITY"; then
            echo "::error::Signing identity not found/valid in temp keychain: $SIGN_IDENTITY"
            security find-identity -v -p codesigning "$KEYCHAIN" || true
            exit 1
          fi
          echo "Signing identity present and valid."

      - name: Import Apple Developer ID intermediate (defense in depth)
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/sutra-signing.keychain-db"
          CERT="$RUNNER_TEMP/DeveloperIDG2CA.cer"
          # The Keychain Access "Export 2 items" .p12 contains only the leaf + key.
          # The G2 intermediate currently ships in the runner's system store, but
          # importing it explicitly removes a future single point of failure.
          if curl -fsSL -o "$CERT" https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer; then
            security import "$CERT" -k "$KEYCHAIN" 2>/dev/null || true
            rm -f "$CERT"
          else
            echo "::warning::Could not fetch Developer ID intermediate; relying on the runner's system store."
          fi

      - name: Decode App Store Connect API key
        if: steps.guard.outputs.skip != 'true'
        env:
          NOTARY_KEY_P8: ${{ secrets.NOTARY_KEY_P8 }}
        run: |
          set -euo pipefail   # no set -x — secret in this step.
          echo "$NOTARY_KEY_P8" | base64 -D > "$RUNNER_TEMP/notary_key.p8"
          if [ ! -s "$RUNNER_TEMP/notary_key.p8" ]; then
            echo "::error::NOTARY_KEY_P8 decoded to an empty file — secret is missing or not valid base64."
            exit 1
          fi

      - name: Build, sign, notarize, staple
        if: steps.guard.outputs.skip != 'true'
        env:
          # SIGN_IDENTITY comes from the job-level env above.
          NOTARY_KEY_PATH: ${{ runner.temp }}/notary_key.p8
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER: ${{ secrets.NOTARY_ISSUER }}
        run: |
          set -euo pipefail
          # bundle.sh re-reads the bare version from Cargo.toml itself and uses the
          # API-key trio for notarization (it takes precedence over NOTARY_PROFILE).
          ./packaging/macos/bundle.sh

      - name: Verify DMG exists and is notarized
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          DMG="dist/Sutra-$VERSION.dmg"
          test -f "$DMG" || { echo "::error::Expected $DMG was not produced"; exit 1; }
          # Both checks are fatal: a DMG that staples but fails Gatekeeper must NOT
          # be published to the release or the Homebrew cask.
          xcrun stapler validate "$DMG"
          spctl -a -t open --context context:primary-signature -vv "$DMG"

      - name: Upload DMG to the GitHub release
        if: steps.guard.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: dist/Sutra-${{ steps.ver.outputs.version }}.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump Homebrew cask
        if: steps.guard.outputs.skip != 'true'
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          DMG="dist/Sutra-$VERSION.dmg"

          # sha256 of the EXACT file uploaded to the release (same local path,
          # no re-compression between upload and here).
          SHA256="$(shasum -a 256 "$DMG" | awk '{print $1}')"
          echo "DMG sha256: $SHA256"

          TAP_DIR="$RUNNER_TEMP/homebrew-tap"
          rm -rf "$TAP_DIR"
          # Use http.extraheader so the PAT never lands in $TAP_DIR/.git/config.
          # GITHUB_TOKEN cannot push to the tap repo, hence the dedicated PAT.
          git -c http.https://github.com/.extraheader="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$HOMEBREW_TAP_TOKEN" | base64)" \
            clone --depth 1 https://github.com/synestheticsystems/homebrew-tap.git "$TAP_DIR"

          CASK="$TAP_DIR/Casks/sutra.rb"
          test -f "$CASK" || { echo "::error::$CASK not found in tap"; exit 1; }

          # Update version + sha256 in place. The url line uses #{version} so it
          # tracks automatically and needs no edit. Use | as the s/// delimiter so
          # an unusual version string can never break the substitution.
          /usr/bin/sed -i '' -E \
            -e "s|^([[:space:]]*version )\"[^\"]*\"|\1\"$VERSION\"|" \
            -e "s|^([[:space:]]*sha256 )\"[^\"]*\"|\1\"$SHA256\"|" \
            "$CASK"

          echo "----- updated Casks/sutra.rb -----"
          cat "$CASK"

          if git -C "$TAP_DIR" diff --quiet; then
            echo "Cask already at version $VERSION with this sha256 — nothing to commit."
            exit 0
          fi

          # Detect the tap's default branch rather than assuming 'main'.
          DEFAULT_BRANCH="$(git -C "$TAP_DIR" symbolic-ref --short HEAD)"
          echo "Tap default branch: $DEFAULT_BRANCH"

          git -C "$TAP_DIR" config user.name "github-actions[bot]"
          git -C "$TAP_DIR" config user.email "github-actions[bot]@users.noreply.github.com"
          git -C "$TAP_DIR" commit -am "sutra $VERSION"
          git -C "$TAP_DIR" \
            -c http.https://github.com/.extraheader="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$HOMEBREW_TAP_TOKEN" | base64)" \
            push origin "HEAD:$DEFAULT_BRANCH"

      - name: Clean up signing material
        if: always()
        run: |
          set -euo pipefail
          rm -f "$RUNNER_TEMP/cert.p12" "$RUNNER_TEMP/notary_key.p8" || true
          rm -rf "$RUNNER_TEMP/homebrew-tap" || true
          security delete-keychain "$RUNNER_TEMP/sutra-signing.keychain-db" 2>/dev/null || true